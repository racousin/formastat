# FormaStat curriculum — the simple→hardest problem ladder.
#
# Each problem feeds the autoformalization loop as a LaTeX/natural-language
# statement. `target_mathlib_decls` are hints (real Mathlib names, verified to
# exist as of Mathlib v4.32.0-rc1) injected as retrieval context. `expected`
# is our prior for the pilot report, NOT an assertion: `verifiable` = should
# succeed against real Mathlib; `frontier` = likely fails (not yet in Mathlib),
# failure is a data point, not a bug.
#
# Naming gotchas to feed the model (autogenerated text gets these wrong):
#   expectation = ∫ / 𝔼[X] / μ[X]  (there is NO `expectation`)
#   strong_law_ae / strong_law_ae_real   (NO `strong_law_of_large_numbers`)
#   MeasureTheory.condExp (camelCase) ; MemLp (not Memℒp) ; poissonMeasure (not poissonPMF)

tiers:
  0:
    name: loop-sanity
    description: Trivial, generic. Validates end-to-end plumbing before any statistics.
  1:
    name: analysis-algebra-warmup
    description: Easy real-analysis / algebra inequalities present in Mathlib.
  2:
    name: probability-foundations
    description: Core probability facts with existing Mathlib declarations.
  3:
    name: named-results
    description: Named theorems with nontrivial proofs; faithfulness matters.
  4:
    name: frontier
    description: Mostly NOT in Mathlib — build-from-scratch; expected partial failure.

problems:
  # ---------- Tier 0 ----------
  - id: t0_two_add_two
    tier: 0
    latex: "$2 + 2 = 4$."
    target_mathlib_decls: []
    expected: verifiable

  - id: t0_add_zero
    tier: 0
    latex: "For every natural number $n$, $n + 0 = n$."
    target_mathlib_decls: ["Nat.add_zero"]
    expected: verifiable

  - id: t0_add_comm_real
    tier: 0
    latex: "For all real numbers $a$ and $b$, $a + b = b + a$."
    target_mathlib_decls: ["add_comm"]
    expected: verifiable

  # ---------- Tier 1 ----------
  - id: t1_amgm_two
    tier: 1
    latex: "For all real numbers $a, b$, $a^2 + b^2 \\ge 2ab$."
    target_mathlib_decls: ["two_mul_le_add_sq", "sq_nonneg"]
    expected: verifiable

  - id: t1_cauchy_schwarz_finite
    tier: 1
    latex: "For real vectors, $\\left(\\sum_i a_i b_i\\right)^2 \\le \\left(\\sum_i a_i^2\\right)\\left(\\sum_i b_i^2\\right)$."
    target_mathlib_decls: ["inner_mul_le_norm_mul_norm", "Finset.inner_mul_le_norm_mul_norm"]
    expected: verifiable

  - id: t1_jensen_convex
    tier: 1
    latex: "If $\\varphi$ is convex on a set $s$ and the weights $w_i \\ge 0$ sum to $1$ with $x_i \\in s$, then $\\varphi(\\sum_i w_i x_i) \\le \\sum_i w_i \\varphi(x_i)$."
    target_mathlib_decls: ["ConvexOn", "ConvexOn.inner_smul_le_map", "ConvexOn.map_centerMass_le"]
    expected: verifiable

  # ---------- Tier 2 ----------
  - id: t2_linearity_expectation
    tier: 2
    latex: "For integrable random variables $X, Y$, $\\mathbb{E}[X + Y] = \\mathbb{E}[X] + \\mathbb{E}[Y]$."
    target_mathlib_decls: ["MeasureTheory.integral_add", "MeasureTheory.integral"]
    expected: verifiable

  - id: t2_variance_nonneg
    tier: 2
    latex: "The variance of a random variable is nonnegative: $\\operatorname{Var}[X] \\ge 0$."
    target_mathlib_decls: ["ProbabilityTheory.variance", "ProbabilityTheory.variance_nonneg"]
    expected: verifiable

  - id: t2_variance_smul
    tier: 2
    latex: "For a constant $a$, $\\operatorname{Var}[aX] = a^2 \\operatorname{Var}[X]$."
    target_mathlib_decls: ["ProbabilityTheory.variance_smul", "ProbabilityTheory.variance_mul"]
    expected: verifiable

  - id: t2_variance_add_indep
    tier: 2
    latex: "If $X$ and $Y$ are independent (and square-integrable), then $\\operatorname{Var}[X + Y] = \\operatorname{Var}[X] + \\operatorname{Var}[Y]$."
    target_mathlib_decls: ["ProbabilityTheory.IndepFun.variance_add", "ProbabilityTheory.IndepFun"]
    expected: verifiable

  - id: t2_chebyshev
    tier: 2
    latex: "Chebyshev's inequality: for $c > 0$, $\\Pr(|X - \\mathbb{E}[X]| \\ge c) \\le \\operatorname{Var}[X]/c^2$."
    target_mathlib_decls: ["ProbabilityTheory.meas_ge_le_variance_div_sq", "ProbabilityTheory.variance"]
    expected: verifiable

  - id: t2_mgf_add_indep
    tier: 2
    latex: "If $X$ and $Y$ are independent, the moment generating function factorizes: $M_{X+Y}(t) = M_X(t)\\, M_Y(t)$."
    target_mathlib_decls: ["ProbabilityTheory.IndepFun.mgf_add", "ProbabilityTheory.mgf"]
    expected: verifiable

  - id: t2_identdistrib_variance
    tier: 2
    latex: "If $X$ and $Y$ are identically distributed, then $\\operatorname{Var}[X] = \\operatorname{Var}[Y]$."
    target_mathlib_decls: ["ProbabilityTheory.IdentDistrib.variance_eq", "ProbabilityTheory.IdentDistrib"]
    expected: verifiable

  # ---------- Tier 3 ----------
  - id: t3_chernoff
    tier: 3
    latex: "Chernoff bound: for $t > 0$, $\\Pr(X \\ge c) \\le e^{-tc} M_X(t)$, where $M_X$ is the moment generating function."
    target_mathlib_decls: ["ProbabilityTheory.measure_ge_le_exp_mul_mgf", "ProbabilityTheory.mgf"]
    expected: verifiable

  - id: t3_gaussian_mean_variance
    tier: 3
    latex: "A real Gaussian with parameters $(\\mu, \\sigma^2)$ has mean $\\mu$ and variance $\\sigma^2$."
    target_mathlib_decls: ["ProbabilityTheory.gaussianReal", "ProbabilityTheory.gaussianReal_mean", "ProbabilityTheory.variance_gaussianReal"]
    expected: verifiable

  - id: t3_strong_law
    tier: 3
    latex: "Strong law of large numbers: if $X_i$ are i.i.d. and integrable with mean $\\mu$, then $\\frac{1}{n}\\sum_{i=1}^n X_i \\to \\mu$ almost surely."
    target_mathlib_decls: ["ProbabilityTheory.strong_law_ae_real", "ProbabilityTheory.strong_law_ae"]
    expected: verifiable
    notes: "Faithfulness-critical: the autoformalized statement must match Mathlib's i.i.d./integrability hypotheses, not a weaker/vacuous variant."

  # ---------- Tier 4 (frontier) ----------
  - id: t4_fisher_cramer_rao
    tier: 4
    latex: "Cramér–Rao lower bound: for an unbiased estimator $T$ of $\\theta$, $\\operatorname{Var}_\\theta(T) \\ge 1 / I(\\theta)$, where $I(\\theta)$ is the Fisher information."
    target_mathlib_decls: []
    expected: frontier
    notes: "Fisher information / Cramér–Rao not in Mathlib — expect failure; record as build-from-scratch target."

  - id: t4_mestimator_consistency
    tier: 4
    latex: "Consistency of M-estimators (van der Vaart, Asymptotic Statistics, Thm 5.7): under a well-separated maximum and uniform convergence of the criterion, the M-estimator is consistent."
    target_mathlib_decls: []
    expected: frontier

  - id: t4_knn_stone
    tier: 4
    latex: "Stone's theorem: the $k$-nearest-neighbour regression estimate is universally consistent provided $k \\to \\infty$ and $k/n \\to 0$."
    target_mathlib_decls: []
    expected: frontier
    notes: "Devroye–Györfi–Lugosi target."

  - id: t4_minimax_lecam
    tier: 4
    latex: "Le Cam's two-point method: a lower bound on the minimax risk via the testing affinity between two hypotheses."
    target_mathlib_decls: []
    expected: frontier

  - id: t4_clt
    tier: 4
    latex: "Central limit theorem: if $X_i$ are i.i.d. with mean $\\mu$ and variance $\\sigma^2 < \\infty$, then $\\sqrt{n}(\\bar X_n - \\mu) \\Rightarrow \\mathcal{N}(0, \\sigma^2)$ in distribution."
    target_mathlib_decls: ["MeasureTheory.charFun", "ProbabilityTheory.gaussianReal"]
    expected: frontier
    notes: "CLT not yet in Mathlib (charFun / Lévy continuity prerequisites are landing). Marquee hard target."
